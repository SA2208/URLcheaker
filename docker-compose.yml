services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: urlchecker
      POSTGRES_USER: urlchecker
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U urlchecker -d urlchecker"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [backend]

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      URLCHECKER_ENVIRONMENT: production
      URLCHECKER_DATABASE_URL: postgresql+psycopg://urlchecker:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/urlchecker
      URLCHECKER_MODEL_BACKEND: ${URLCHECKER_MODEL_BACKEND:-heuristic}
      URLCHECKER_MODEL_PATH: /models/urlchecker_pycaret
      URLCHECKER_FEED_PATH: /app/data/feeds/sample_feed.json
      URLCHECKER_CORS_ORIGINS: '["http://localhost:8080"]'
      URLCHECKER_RATE_LIMIT_PER_MINUTE: 120
      URLCHECKER_MODEL_HMAC_KEY: ${URLCHECKER_MODEL_HMAC_KEY:-}
      URLCHECKER_AUTO_CREATE_TABLES: "false"
    command: ["sh", "-c", "alembic upgrade head && exec uvicorn urlchecker.main:app --host 0.0.0.0 --port 8000"]
    volumes:
      - ./ml/models:/models:ro
    depends_on:
      postgres:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks: [backend, frontend]

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - api
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    networks: [frontend]

networks:
  frontend:
  backend:
    internal: true

volumes:
  postgres-data:
