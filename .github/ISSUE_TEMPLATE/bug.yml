name: Bug report
description: Report a reproducible defect without sensitive threat data.
title: "[Bug]: "
labels: ["type:bug"]
body:
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Use reserved example domains instead of active malicious URLs.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
